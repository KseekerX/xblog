  <!-- 编辑器 -->
  <div class="editor-page" id="editorPage">
    <div class="editor-topbar">
      <button class="editor-back-btn" onclick="handleBackClick()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <div class="editor-topbar-right">
        <div class="draft-indicator" id="draftIndicator">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          草稿
        </div>
      </div>
    </div>

    <div class="editor-body">
      <div class="editor-header">
        <input type="text" class="editor-title-input" id="editorTitleInput" placeholder="输入文章标题...">
        <div class="editor-meta-row">
          <select class="category-select" id="editorCategory"><option value="">选择分类</option></select>
        </div>
      </div>

      <div class="editor-main">
        <div class="editor-container">
          <textarea id="editorContent"></textarea>
        </div>
      </div>

      <div class="editor-footer">
        <button class="editor-btn editor-btn-secondary" onclick="saveArticleAsDraft()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          保存草稿
        </button>
        <button class="editor-btn editor-btn-primary" onclick="publishArticle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          发表文章
        </button>
      </div>
    </div>
  </div>

  <!-- 分类模态框 -->
  <div class="modal-overlay" id="addCategoryModal">
    <div class="modal">
      <h3 class="modal-title">添加新分类</h3>
      <input type="text" class="modal-input" id="newCategoryInput" placeholder="输入分类名称..." onkeydown="if(event.key==='Enter')confirmAddCategory()">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeAddCategoryModal()">取消</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmAddCategory()">添加</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editCategoryModal">
    <div class="modal">
      <h3 class="modal-title">编辑分类</h3>
      <input type="text" class="modal-input" id="editCategoryInput" placeholder="输入分类名称..." onkeydown="if(event.key==='Enter')confirmEditCategory()">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeEditCategoryModal()">取消</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmEditCategory()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认返回保存草稿模态框 -->
  <div class="modal-overlay" id="confirmBackModal">
    <div class="modal confirm-modal">
      <h3 class="modal-title">是否保存草稿？</h3>
      <p class="confirm-modal-text">你编辑的内容尚未保存，是否保存为草稿？</p>
      <div class="confirm-modal-actions">
        <button class="confirm-btn confirm-btn-save" onclick="confirmBackSaveDraft()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          保存草稿
        </button>
        <button class="confirm-btn confirm-btn-discard" onclick="confirmBackDiscard()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          不保存
        </button>
        <button class="confirm-btn confirm-btn-cancel" onclick="closeConfirmBackModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
        return hljs.highlightAuto(code).value;
      },
      breaks: true, gfm: true
    });

    const STORAGE_KEY_ARTICLES = 'x-blog-articles-v7';
    const STORAGE_KEY_CATEGORIES = 'x-blog-categories-v3';

    let editorInstance = null, currentEditId = null, currentCategory = null, currentView = 'all', editingCategory = null, searchQuery = '';
    let expandedCategories = new Set();

    function getArticles() { const d = localStorage.getItem(STORAGE_KEY_ARTICLES); return d ? JSON.parse(d) : []; }
    function saveArticles(a) { localStorage.setItem(STORAGE_KEY_ARTICLES, JSON.stringify(a)); }
    function getCategories() { const d = localStorage.getItem(STORAGE_KEY_CATEGORIES); return d ? JSON.parse(d) : []; }
    function saveCategories(c) { localStorage.setItem(STORAGE_KEY_CATEGORIES, JSON.stringify(c)); }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
    function formatDate(s) { const d = new Date(s), m = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']; return m[d.getMonth()] + d.getDate() + '日'; }
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('sidebar').classList.toggle('open'); }

    function renderSidebar() {
      const articles = getArticles(), categories = getCategories();
      document.getElementById('totalArticleCount').textContent = articles.filter(a => !a.isDraft).length;
      document.getElementById('draftCount').textContent = articles.filter(a => a.isDraft).length;
      const cl = document.getElementById('categoryList');
      cl.innerHTML = categories.map(cat => {
        const catArts = articles.filter(a => a.category === cat && !a.isDraft);
        const expanded = expandedCategories.has(cat);
        return `
          <div class="category-item ${expanded ? 'expanded' : ''}">
            <div class="category-header" onclick="toggleCategoryExpand('${escapeHtml(cat)}')">
              <span class="category-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
              <span class="category-name">${escapeHtml(cat)}</span>
              <span class="category-count">${catArts.length}</span>
              <div class="category-actions">
                <button class="category-action-btn" onclick="event.stopPropagation(); openEditCategoryModal('${escapeHtml(cat)}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="category-action-btn delete" onclick="event.stopPropagation(); deleteCategory('${escapeHtml(cat)}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              </div>
              <svg class="category-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="category-articles">
              ${catArts.length === 0 ? '<div class="category-article-item" style="color: var(--text-tertiary); cursor: default;">暂无文章</div>' :
                catArts.map(a => `<div class="category-article-item" onclick="event.stopPropagation(); viewArticle('${a.id}')"><div class="category-article-title">${escapeHtml(a.title)}</div><div class="category-article-date">${formatDate(a.createdAt)}</div></div>`).join('')
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleCategoryExpand(cat) {
      if (expandedCategories.has(cat)) expandedCategories.delete(cat); else expandedCategories.add(cat);
      renderSidebar();
    }

    function filterByCategory(cat) {
      currentCategory = cat; currentView = 'category';
      document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
      document.getElementById('topbarTitle').textContent = cat || '全部文章';
      document.getElementById('pageSubtitle').textContent = cat ? `查看「${cat}」分类下的文章` : '在这里，留下每一次灵感的火花';
      if (cat && !expandedCategories.has(cat)) expandedCategories.add(cat);
      renderSidebar(); renderArticles();
    }

    function filterByDrafts() {
      currentCategory = null; currentView = 'drafts';
      document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
      document.getElementById('draftsNav').classList.add('active');
      document.getElementById('topbarTitle').textContent = '草稿箱';
      document.getElementById('pageSubtitle').textContent = '正在编辑的文章';
      renderSidebar(); renderArticles();
    }

    function openAddCategoryModal() { document.getElementById('newCategoryInput').value = ''; document.getElementById('addCategoryModal').classList.add('active'); document.getElementById('newCategoryInput').focus(); }
    function closeAddCategoryModal() { document.getElementById('addCategoryModal').classList.remove('active'); }
    function confirmAddCategory() {
      const n = document.getElementById('newCategoryInput').value.trim();
      if (!n) return;
      const cats = getCategories();
      if (cats.includes(n)) { alert('该分类已存在'); return; }
      cats.push(n); saveCategories(cats);
      expandedCategories.add(n);
      closeAddCategoryModal(); renderSidebar();
    }

    function openEditCategoryModal(cat) { editingCategory = cat; document.getElementById('editCategoryInput').value = cat; document.getElementById('editCategoryModal').classList.add('active'); document.getElementById('editCategoryInput').focus(); }
    function closeEditCategoryModal() { document.getElementById('editCategoryModal').classList.remove('active'); editingCategory = null; }
    function confirmEditCategory() {
      const n = document.getElementById('editCategoryInput').value.trim();
      if (!n || !editingCategory) return;
      if (n === editingCategory) { closeEditCategoryModal(); return; }
      const cats = getCategories();
      if (cats.includes(n)) { alert('该分类已存在'); return; }
      const idx = cats.indexOf(editingCategory);
      if (idx !== -1) { cats[idx] = n; saveCategories(cats); }
      const arts = getArticles();
      arts.forEach(a => { if (a.category === editingCategory) a.category = n; });
      saveArticles(arts);
      expandedCategories.delete(editingCategory); expandedCategories.add(n);
      currentCategory = n;
      closeEditCategoryModal(); renderSidebar(); renderArticles();
    }

    function deleteCategory(cat) {
      if (!confirm(`确定要删除分类「${cat}」吗？该分类下的文章将变为"未分类"。`)) return;
      let cats = getCategories(); cats = cats.filter(c => c !== cat); saveCategories(cats);
      const arts = getArticles();
      arts.forEach(a => { if (a.category === cat) a.category = ''; });
      saveArticles(arts);
      expandedCategories.delete(cat);
      if (currentCategory === cat) { currentCategory = null; currentView = 'all'; }
      renderSidebar(); renderArticles();
    }

    function handleSearch(v) { searchQuery = v.trim().toLowerCase(); showSearchResults(); }
    function handleSearchFocus(f) {
      const r = document.getElementById('searchResults');
      if (f && searchQuery) r.classList.add('active'); else setTimeout(() => r.classList.remove('active'), 200);
    }

    function showSearchResults() {
      const arts = getArticles(), r = document.getElementById('searchResults');
      if (!searchQuery) { r.classList.remove('active'); return; }
      const f = arts.filter(a => a.title.toLowerCase().includes(searchQuery) || a.content.toLowerCase().includes(searchQuery)).slice(0, 6);
      if (f.length === 0) r.innerHTML = '<div class="search-no-results">没有找到相关文章</div>';
      else r.innerHTML = f.map(a => `<div class="search-result-item" onclick="viewArticle('${a.id}'); document.getElementById('searchInput').value=''; searchQuery='';"><div class="search-result-title">${escapeHtml(a.title)}${a.isDraft ? ' [草稿]' : ''}</div><div class="search-result-excerpt">${escapeHtml(a.content.substring(0, 50))}...</div></div>`).join('');
      r.classList.add('active');
    }

    function updateStats() {
      const arts = getArticles();
      let f = arts;
      if (currentView === 'drafts') f = arts.filter(a => a.isDraft);
      else if (currentCategory) f = arts.filter(a => a.category === currentCategory && !a.isDraft);
      else f = arts.filter(a => !a.isDraft);
      if (searchQuery) f = f.filter(a => a.title.toLowerCase().includes(searchQuery) || a.content.toLowerCase().includes(searchQuery));
      document.getElementById('articleCount').textContent = f.length;
      document.getElementById('wordCount').textContent = f.reduce((s, a) => s + (a.content ? a.content.length : 0), 0);
    }

    function renderArticles() {
      const arts = getArticles();
      let f = arts;
      if (currentView === 'drafts') f = arts.filter(a => a.isDraft);
      else if (currentCategory) f = arts.filter(a => a.category === currentCategory && !a.isDraft);
      else f = arts.filter(a => !a.isDraft);
      if (searchQuery) f = f.filter(a => a.title.toLowerCase().includes(searchQuery) || a.content.toLowerCase().includes(searchQuery));
      const c = document.getElementById('articlesList');
      updateStats();
      if (f.length === 0) {
        c.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></div><h3 class="empty-title">${searchQuery ? '没有找到相关文章' : currentView === 'drafts' ? '草稿箱是空的' : '开始你的创作之旅'}</h3><p class="empty-desc">${searchQuery ? '尝试其他关键词吧' : currentView === 'drafts' ? '保存草稿，不会丢失任何灵感' : '还没有任何文章，记录下你的第一个想法吧'}</p>${!searchQuery && currentView !== 'drafts' ? '<button class="btn btn-primary" onclick="openEditor()">写下第一篇</button>' : ''}</div>`;
        return;
      }
      const sa = [...f].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      c.innerHTML = sa.map(a => `
        <article class="article-card" onclick="viewArticle('${a.id}')">
          <div class="article-meta">
            ${a.isDraft ? '<span class="article-draft-badge">草稿</span>' : (a.category ? `<span class="article-tag">${escapeHtml(a.category)}</span>` : '')}
            <span class="article-date"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>${formatDate(a.updatedAt)}</span>
          </div>
          <h2 class="article-title">${escapeHtml(a.title)}</h2>
          <p class="article-excerpt">${escapeHtml(a.content)}</p>
          <div class="article-footer">
            <span class="article-read-more">${a.isDraft ? '继续编辑' : '阅读全文'}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
            <div class="article-actions">
              <button class="action-btn" onclick="event.stopPropagation(); editArticle('${a.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              <button class="action-btn delete" onclick="event.stopPropagation(); deleteArticle('${a.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function viewArticle(id) {
      const arts = getArticles(), a = arts.find(x => x.id === id);
      if (!a) return;
      document.getElementById('listView').style.display = 'none';
      document.getElementById('articleView').style.display = 'block';
      const ui = a.updatedAt !== a.createdAt ? `<span>编辑于 ${formatDate(a.updatedAt)}</span>` : '';
      const rc = marked.parse(a.content);
      let mh = a.isDraft ? `<span class="article-draft-badge">草稿</span>` : (a.category ? `<span class="article-tag">${escapeHtml(a.category)}</span>` : '');
      document.getElementById('articleDetail').innerHTML = `<div class="article-view-header">${mh}<h1 class="article-view-title">${escapeHtml(a.title)}</h1><div class="article-view-meta"><span>${formatDate(a.createdAt)}</span>${ui}<span>${a.content.length} 字</span></div></div><div class="article-view-content">${rc}</div>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showHome() {
      currentCategory = null; currentView = 'all'; searchQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('listView').style.display = 'block';
      document.getElementById('articleView').style.display = 'none';
      document.getElementById('topbarTitle').textContent = '全部文章';
      document.getElementById('pageSubtitle').textContent = '在这里，留下每一次灵感的火花';
      document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
      document.getElementById('allArticlesNav').classList.add('active');
      renderSidebar(); renderArticles();
    }

    function initEditor(ic = '') {
      if (editorInstance) { editorInstance.toTextArea(); editorInstance = null; }
      
      // 清理可能存在的旧标题菜单
      const existingMenu = document.getElementById('headingMenu');
      if (existingMenu) existingMenu.remove();
      const existingDropdown = document.getElementById('headingDropdown');
      if (existingDropdown) existingDropdown.remove();
      
      editorInstance = new EasyMDE({
        element: document.getElementById('editorContent'),
        placeholder: '',
        spellChecker: false,
        autofocus: true,
        autosave: { enabled: false },
        status: true,
        toolbar: [
          'bold', 'italic', '|',
          {
            name: 'heading',
            action: function(realEditor) {
              const menu = document.getElementById('headingMenu');
              if (menu) {
                menu.classList.toggle('active');
                menu.style.left = '0';
              }
            },
            className: 'fa-header',
            title: '标题'
          },
          '|',
          'quote', 'unordered-list', 'ordered-list', '|',
          'link', 'image', 'code', 'table', '|',
          'preview', 'side-by-side', 'fullscreen', '|',
          'guide'
        ],
        toolbarTips: true,
        promptURLs: true,
        renderingConfig: { codeSyntaxHighlighting: true, hljs: window.hljs }
      });
      if (ic) editorInstance.value(ic);

      // 等待 EasyMDE 渲染完成后再创建下拉菜单
      waitForEditorToolbar();
    }
    
    function waitForEditorToolbar() {
      const maxAttempts = 20;
      let attempts = 0;
      
      function tryCreateDropdown() {
        attempts++;
        const toolbar = document.querySelector('.editor-toolbar');
        const hBtn = toolbar ? toolbar.querySelector('button[title="标题"]') : null;
        
        if (hBtn) {
          // 创建自定义下拉容器
          const dropdown = document.createElement('div');
          dropdown.id = 'headingDropdown';
          dropdown.className = 'heading-dropdown';
          
          const btn = document.createElement('button');
          btn.className = 'heading-btn';
          btn.type = 'button';
          btn.innerHTML = '标题';
          btn.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            const menu = document.getElementById('headingMenu');
            if (menu) menu.classList.toggle('active');
          };
          
          const menu = document.createElement('div');
          menu.id = 'headingMenu';
          menu.className = 'heading-menu';
          menu.innerHTML = `
            <div class="heading-menu-item" data-level="1" onclick="event.stopPropagation(); insertHeading(1)"><span class="heading-hash"># </span>标题 1</div>
            <div class="heading-menu-item" data-level="2" onclick="event.stopPropagation(); insertHeading(2)"><span class="heading-hash">## </span>标题 2</div>
            <div class="heading-menu-item" data-level="3" onclick="event.stopPropagation(); insertHeading(3)"><span class="heading-hash">### </span>标题 3</div>
            <div class="heading-menu-item" data-level="4" onclick="event.stopPropagation(); insertHeading(4)"><span class="heading-hash">#### </span>标题 4</div>
            <div class="heading-menu-item" data-level="5" onclick="event.stopPropagation(); insertHeading(5)"><span class="heading-hash">##### </span>标题 5</div>
            <div class="heading-menu-item" data-level="6" onclick="event.stopPropagation(); insertHeading(6)"><span class="heading-hash">###### </span>标题 6</div>
          `;
          
          dropdown.appendChild(btn);
          dropdown.appendChild(menu);
          hBtn.parentElement.replaceChild(dropdown, hBtn);
          
          // 隐藏原来的 EasyMDE 标题按钮
          const originalBtn = dropdown.querySelector('button');
          // 不需要隐藏，因为我们替换了整个按钮
        } else if (attempts < maxAttempts) {
          setTimeout(tryCreateDropdown, 100);
        }
      }
      
      tryCreateDropdown();
    }

    function insertHeading(level) {
      if (!editorInstance) return;
      const cm = editorInstance.codemirror;
      const sel = cm.getSelection();
      const prefix = '#'.repeat(level) + ' ';
      if (sel) {
        cm.replaceSelection(prefix + sel);
      } else {
        const cursor = cm.getCursor();
        cm.replaceRange(prefix + '标题\n', cursor);
      }
      document.getElementById('headingMenu').classList.remove('active');
      cm.focus();
    }

    function populateCategorySelect(cs = '') {
      const s = document.getElementById('editorCategory');
      const cats = getCategories();
      s.innerHTML = '<option value="">选择分类</option>' + cats.map(c => `<option value="${escapeHtml(c)}" ${c === cs ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('');
    }

    function openEditor(id = null) {
      currentEditId = id;
      const ep = document.getElementById('editorPage');
      const ti = document.getElementById('editorTitleInput');
      const di = document.getElementById('draftIndicator');
      ti.value = '';
      di.classList.remove('active');
      populateCategorySelect();
      if (id) {
        const arts = getArticles(), a = arts.find(x => x.id === id);
        if (a) {
          ti.value = a.title;
          populateCategorySelect(a.category);
          if (a.isDraft) di.classList.add('active');
          setTimeout(() => { if (!editorInstance) initEditor(a.content); else editorInstance.value(a.content); }, 100);
        }
      } else {
        setTimeout(() => { if (!editorInstance) initEditor(); else editorInstance.value(''); }, 100);
      }
      ep.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeEditor() {
      document.getElementById('editorPage').classList.remove('active');
      document.body.style.overflow = '';
      currentEditId = null;
    }

    // 检查编辑器是否有未保存的内容
    function hasUnsavedContent() {
      const title = document.getElementById('editorTitleInput').value.trim();
      const content = editorInstance ? editorInstance.value().trim() : '';
      return title || content;
    }

    // 关闭确认返回模态框
    function closeConfirmBackModal() {
      document.getElementById('confirmBackModal').classList.remove('active');
    }

    // 确认返回并保存草稿
    function confirmBackSaveDraft() {
      closeConfirmBackModal();
      // 保存草稿（不显示提示）
      const ti = document.getElementById('editorTitleInput').value.trim();
      const co = editorInstance ? editorInstance.value() : '';
      const ca = document.getElementById('editorCategory').value;
      if (ti) {
        const arts = getArticles();
        const now = new Date().toISOString();
        if (currentEditId) {
          const idx = arts.findIndex(x => x.id === currentEditId);
          if (idx !== -1) arts[idx] = { ...arts[idx], title: ti, content: co, category: ca || arts[idx].category, isDraft: true, updatedAt: now };
        } else {
          arts.push({ id: generateId(), title: ti, content: co, category: ca || '', isDraft: true, createdAt: now, updatedAt: now });
        }
        saveArticles(arts);
      }
      closeEditor();
      showHome();
      filterByDrafts();
    }

    // 确认返回不保存
    function confirmBackDiscard() {
      closeConfirmBackModal();
      closeEditor();
      showHome();
    }

    // 返回按钮处理（带确认）
    function handleBackClick() {
      if (hasUnsavedContent()) {
        document.getElementById('confirmBackModal').classList.add('active');
      } else {
        closeEditor();
        showHome();
      }
    }

    function saveArticleAsDraft() {
      const ti = document.getElementById('editorTitleInput').value.trim();
      const co = editorInstance ? editorInstance.value() : '';
      const ca = document.getElementById('editorCategory').value;
      if (!ti) { alert('请输入文章标题'); document.getElementById('editorTitleInput').focus(); return; }
      const arts = getArticles();
      const now = new Date().toISOString();
      if (currentEditId) {
        const idx = arts.findIndex(x => x.id === currentEditId);
        if (idx !== -1) arts[idx] = { ...arts[idx], title: ti, content: co, category: ca || arts[idx].category, isDraft: true, updatedAt: now };
      } else {
        arts.push({ id: generateId(), title: ti, content: co, category: ca || '', isDraft: true, createdAt: now, updatedAt: now });
      }
      saveArticles(arts);
      closeEditor(); showHome(); filterByDrafts();
    }

    function publishArticle() {
      const ti = document.getElementById('editorTitleInput').value.trim();
      const co = editorInstance ? editorInstance.value() : '';
      const ca = document.getElementById('editorCategory').value;
      if (!ti) { alert('请输入文章标题'); document.getElementById('editorTitleInput').focus(); return; }
      const arts = getArticles();
      const now = new Date().toISOString();
      if (currentEditId) {
        const idx = arts.findIndex(x => x.id === currentEditId);
        if (idx !== -1) arts[idx] = { ...arts[idx], title: ti, content: co, category: ca || arts[idx].category, isDraft: false, publishedAt: arts[idx].publishedAt || now, updatedAt: now };
      } else {
        arts.push({ id: generateId(), title: ti, content: co, category: ca || '', isDraft: false, createdAt: now, publishedAt: now, updatedAt: now });
      }
      saveArticles(arts);
      closeEditor(); showHome();
    }

    function editArticle(id) { openEditor(id); }
    function deleteArticle(id) {
      if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) return;
      saveArticles(getArticles().filter(a => a.id !== id));
      showHome();
    }

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); if (document.getElementById('editorPage').classList.contains('active')) saveArticleAsDraft(); }
      if (e.key === 'Escape') {
        // 如果有确认模态框打开，先关闭它
        if (document.getElementById('confirmBackModal').classList.contains('active')) {
          closeConfirmBackModal();
          return;
        }
        if (document.getElementById('editorPage').classList.contains('active')) {
          // 检查是否有未保存内容
          if (hasUnsavedContent()) {
            handleBackClick();
          } else {
            closeEditor();
          }
        }
        document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
        const hm = document.getElementById('headingMenu');
        if (hm) hm.classList.remove('active');
      }
    });

    // 点击其他地方关闭标题菜单
    document.addEventListener('click', function(e) {
      const hm = document.getElementById('headingMenu');
      if (hm && !e.target.closest('.heading-dropdown') && !e.target.closest('.heading-menu-item')) {
        hm.classList.remove('active');
      }
    });

    renderSidebar(); renderArticles();
  </script>
</body>
</html>
