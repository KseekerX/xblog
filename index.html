<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Blog | 个人博客</title>
  <link rel="icon" type="image/svg+xml" href="x-logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  
  <style>
    :root {
      --bg-base: #fafaf9;
      --bg-surface: #f5f5f4;
      --bg-card: #ffffff;
      --primary-700: #4c1d95;
      --primary-600: #5b21b6;
      --primary-500: #6d28d9;
      --primary-gradient: linear-gradient(135deg, #5b21b6 0%, #6d28d9 50%, #7c3aed 100%);
      --text-primary: #1c1917;
      --text-secondary: #57534e;
      --text-tertiary: #a8a29e;
      --border-subtle: rgba(0, 0, 0, 0.06);
      --border-accent: rgba(109, 40, 217, 0.4);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.1);
      --sidebar-width: 280px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== 高级动态背景 ========== */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* 主网格背景 */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(109, 40, 217, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(109, 40, 217, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* 渐变光晕层 */
    .glow-layer {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(109, 40, 217, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 90%, rgba(91, 33, 182, 0.05) 0%, transparent 50%);
    }

    /* 大型浮动光球 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      will-change: transform;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(109, 40, 217, 0.25) 0%, rgba(91, 33, 182, 0.1) 40%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: orbFloat1 20s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, rgba(109, 40, 217, 0.08) 40%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: orbFloat2 25s ease-in-out infinite;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 18s ease-in-out infinite;
    }

    .orb-4 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.12) 0%, transparent 70%);
      top: 20%;
      left: 30%;
      animation: orbFloat4 22s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-50px, 80px) scale(1.1); }
      50% { transform: translate(30px, 40px) scale(0.95); }
      75% { transform: translate(-20px, -30px) scale(1.05); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(60px, -40px) scale(1.08); }
      66% { transform: translate(-30px, 60px) scale(0.92); }
    }

    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); }
    }

    @keyframes orbFloat4 {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(40px, -30px); }
      40% { transform: translate(-20px, 40px); }
      60% { transform: translate(30px, 20px); }
      80% { transform: translate(-40px, -20px); }
    }

    /* 粒子系统 */
    .particles-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--primary-500);
      opacity: 0.6;
    }

    .particle:nth-child(1) { width: 6px; height: 6px; left: 8%; top: 15%; animation: particleDrift1 12s ease-in-out infinite; }
    .particle:nth-child(2) { width: 4px; height: 4px; left: 15%; top: 45%; animation: particleDrift2 10s ease-in-out infinite; }
    .particle:nth-child(3) { width: 5px; height: 5px; left: 22%; top: 70%; animation: particleDrift3 14s ease-in-out infinite; }
    .particle:nth-child(4) { width: 3px; height: 3px; left: 35%; top: 25%; animation: particleDrift4 11s ease-in-out infinite; }
    .particle:nth-child(5) { width: 4px; height: 4px; left: 42%; top: 55%; animation: particleDrift5 13s ease-in-out infinite; }
    .particle:nth-child(6) { width: 6px; height: 6px; left: 50%; top: 80%; animation: particleDrift6 15s ease-in-out infinite; }
    .particle:nth-child(7) { width: 3px; height: 3px; left: 58%; top: 35%; animation: particleDrift7 9s ease-in-out infinite; }
    .particle:nth-child(8) { width: 5px; height: 5px; left: 65%; top: 65%; animation: particleDrift8 12s ease-in-out infinite; }
    .particle:nth-child(9) { width: 4px; height: 4px; left: 72%; top: 20%; animation: particleDrift9 14s ease-in-out infinite; }
    .particle:nth-child(10) { width: 6px; height: 6px; left: 78%; top: 48%; animation: particleDrift10 11s ease-in-out infinite; }
    .particle:nth-child(11) { width: 3px; height: 3px; left: 85%; top: 75%; animation: particleDrift11 13s ease-in-out infinite; }
    .particle:nth-child(12) { width: 5px; height: 5px; left: 92%; top: 30%; animation: particleDrift12 10s ease-in-out infinite; }

    @keyframes particleDrift1 { 0%, 100% { transform: translate(0, 0); opacity: 0.6; } 50% { transform: translate(30px, -40px); opacity: 1; } }
    @keyframes particleDrift2 { 0%, 100% { transform: translate(0, 0); opacity: 0.5; } 50% { transform: translate(-20px, 30px); opacity: 0.9; } }
    @keyframes particleDrift3 { 0%, 100% { transform: translate(0, 0); opacity: 0.7; } 50% { transform: translate(40px, 20px); opacity: 1; } }
    @keyframes particleDrift4 { 0%, 100% { transform: translate(0, 0); opacity: 0.4; } 50% { transform: translate(-30px, -20px); opacity: 0.8; } }
    @keyframes particleDrift5 { 0%, 100% { transform: translate(0, 0); opacity: 0.6; } 50% { transform: translate(20px, 40px); opacity: 1; } }
    @keyframes particleDrift6 { 0%, 100% { transform: translate(0, 0); opacity: 0.5; } 50% { transform: translate(-40px, -30px); opacity: 0.9; } }
    @keyframes particleDrift7 { 0%, 100% { transform: translate(0, 0); opacity: 0.7; } 50% { transform: translate(30px, 30px); opacity: 1; } }
    @keyframes particleDrift8 { 0%, 100% { transform: translate(0, 0); opacity: 0.4; } 50% { transform: translate(-20px, 20px); opacity: 0.8; } }
    @keyframes particleDrift9 { 0%, 100% { transform: translate(0, 0); opacity: 0.6; } 50% { transform: translate(40px, -20px); opacity: 1; } }
    @keyframes particleDrift10 { 0%, 100% { transform: translate(0, 0); opacity: 0.5; } 50% { transform: translate(-30px, 40px); opacity: 0.9; } }
    @keyframes particleDrift11 { 0%, 100% { transform: translate(0, 0); opacity: 0.7; } 50% { transform: translate(20px, -30px); opacity: 1; } }
    @keyframes particleDrift12 { 0%, 100% { transform: translate(0, 0); opacity: 0.4; } 50% { transform: translate(-40px, 20px); opacity: 0.8; } }

    /* 流动线条 */
    .lines-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .flow-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(109, 40, 217, 0.3) 20%, rgba(124, 58, 237, 0.5) 50%, rgba(109, 40, 217, 0.3) 80%, transparent 100%);
      transform-origin: left center;
    }

    .flow-line:nth-child(1) { width: 300px; top: 20%; left: -10%; animation: lineFlow1 8s linear infinite; }
    .flow-line:nth-child(2) { width: 250px; top: 35%; left: 20%; animation: lineFlow2 10s linear infinite; animation-delay: -2s; }
    .flow-line:nth-child(3) { width: 350px; top: 50%; left: 50%; animation: lineFlow3 12s linear infinite; animation-delay: -4s; }
    .flow-line:nth-child(4) { width: 280px; top: 65%; left: 10%; animation: lineFlow4 9s linear infinite; animation-delay: -6s; }
    .flow-line:nth-child(5) { width: 320px; top: 80%; left: 60%; animation: lineFlow5 11s linear infinite; animation-delay: -3s; }

    @keyframes lineFlow1 { 0% { transform: translateX(0) scaleX(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(120vw) scaleX(1.5); opacity: 0; } }
    @keyframes lineFlow2 { 0% { transform: translateX(0) rotate(5deg); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateX(100vw) rotate(5deg); opacity: 0; } }
    @keyframes lineFlow3 { 0% { transform: translateX(0) rotate(-3deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(80vw) rotate(-3deg); opacity: 0; } }
    @keyframes lineFlow4 { 0% { transform: translateX(0) scaleX(0.8); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateX(110vw) scaleX(0.8); opacity: 0; } }
    @keyframes lineFlow5 { 0% { transform: translateX(0) rotate(8deg); opacity: 0; } 10% { opacity: 0.9; } 90% { opacity: 0.9; } 100% { transform: translateX(90vw) rotate(8deg); opacity: 0; } }

    /* 3D几何图形 */
    .geo-container {
      position: absolute;
      inset: 0;
      perspective: 1000px;
    }

    .geo-shape {
      position: absolute;
      border: 2px solid rgba(109, 40, 217, 0.15);
      transform-style: preserve-3d;
      will-change: transform;
    }

    .geo-shape-1 {
      width: 120px;
      height: 120px;
      top: 10%;
      left: 5%;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      animation: geoMorph1 20s ease-in-out infinite;
    }

    .geo-shape-2 {
      width: 80px;
      height: 80px;
      top: 60%;
      right: 8%;
      border-radius: 50%;
      animation: geoRotate3d 25s linear infinite;
    }

    .geo-shape-3 {
      width: 100px;
      height: 100px;
      top: 70%;
      left: 15%;
      border-style: dashed;
      border-radius: 10px;
      transform: rotate(45deg);
      animation: geoRotate3d 30s linear infinite reverse;
    }

    .geo-shape-4 {
      width: 60px;
      height: 60px;
      top: 25%;
      right: 20%;
      border-radius: 50%;
      border-width: 1px;
      animation: geoPulse 15s ease-in-out infinite;
    }

    @keyframes geoMorph1 {
      0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: translate(0, 0) rotate(0deg); }
      25% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(20px, 30px) rotate(90deg); }
      50% { border-radius: 50% 50% 20% 80% / 40% 60% 40% 60%; transform: translate(-10px, 20px) rotate(180deg); }
      75% { border-radius: 40% 60% 80% 20% / 70% 30% 70% 30%; transform: translate(30px, -20px) rotate(270deg); }
    }

    @keyframes geoRotate3d {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    @keyframes geoPulse {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.3); opacity: 0.25; }
    }

    /* 波纹效果 */
    .ripple-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border: 1px solid rgba(109, 40, 217, 0.1);
      border-radius: 50%;
      animation: rippleExpand 8s ease-out infinite;
    }

    .ripple:nth-child(1) { width: 200px; height: 200px; top: 30%; left: 40%; animation-delay: 0s; }
    .ripple:nth-child(2) { width: 150px; height: 150px; top: 50%; left: 60%; animation-delay: -2s; }
    .ripple:nth-child(3) { width: 180px; height: 180px; top: 20%; left: 70%; animation-delay: -4s; }
    .ripple:nth-child(4) { width: 220px; height: 220px; top: 60%; left: 30%; animation-delay: -6s; }

    @keyframes rippleExpand {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
    }

    /* ========== 布局 ========== */
    .app-layout {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ========== 侧边栏 ========== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.3s var(--ease-out), width 0.3s var(--ease-out);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.04);
    }

    .sidebar.collapsed { width: 0; transform: translateX(calc(-1 * var(--sidebar-width))); }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    /* 设计的X图标 */
    .logo-icon {
      width: 38px;
      height: 38px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 8px rgba(91, 33, 182, 0.3));
    }

    .sidebar-logo-text {
      font-size: 18px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .sidebar-toggle:hover { background: var(--bg-card); color: var(--text-primary); }

    .sidebar-search { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
    .search-input-wrapper { position: relative; }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      transition: all 0.2s;
    }

    .search-input::placeholder { color: var(--text-tertiary); }
    .search-input:focus { outline: none; border-color: var(--border-accent); background: var(--bg-card); box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.08); }

    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-hover);
      max-height: 280px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .search-results.active { display: block; }
    .search-result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); transition: background 0.15s; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg-surface); }
    .search-result-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .search-result-excerpt { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-no-results { padding: 16px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 16px 0; }
    .sidebar-section { margin-bottom: 8px; }

    .sidebar-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
    }

    .sidebar-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); }

    .add-category-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px dashed var(--border-hover);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-tertiary);
      transition: all 0.2s;
      font-size: 16px;
    }

    .add-category-btn:hover { background: var(--bg-surface); border-color: var(--primary-500); color: var(--primary-500); }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      gap: 10px;
      position: relative;
    }

    .nav-item:hover { background: var(--bg-surface); }
    .nav-item.active { background: rgba(109, 40, 217, 0.08); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary-gradient); }

    .nav-item-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .nav-item.active .nav-item-icon { background: var(--primary-gradient); color: white; }

    .nav-item-text { flex: 1; font-size: 14px; font-weight: 500; }

    .nav-item-count {
      font-size: 12px;
      color: var(--text-tertiary);
      background: var(--bg-surface);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .category-item { position: relative; }

    .category-header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      gap: 10px;
    }

    .category-header:hover { background: var(--bg-surface); }

    .category-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(109, 40, 217, 0.1);
      border-radius: var(--radius-sm);
      color: var(--primary-600);
      flex-shrink: 0;
    }

    .category-name { flex: 1; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .category-count { font-size: 12px; color: var(--text-tertiary); background: var(--bg-surface); padding: 2px 8px; border-radius: 10px; }

    .category-arrow { color: var(--text-tertiary); transition: transform 0.2s; flex-shrink: 0; }
    .category-item.expanded > .category-header .category-arrow { transform: rotate(90deg); }

    .category-actions { display: none; gap: 4px; }
    .category-header:hover .category-actions { display: flex; }

    .category-action-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-tertiary);
      transition: all 0.15s;
    }

    .category-action-btn:hover { background: var(--bg-card); color: var(--text-primary); }
    .category-action-btn.delete:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

    .category-articles {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s var(--ease-out);
      padding-left: 20px;
    }

    .category-item.expanded > .category-articles { max-height: 400px; }

    .category-article-item {
      padding: 8px 12px 8px 40px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .category-article-item:hover { background: var(--bg-surface); }
    .category-article-item.active { background: rgba(109, 40, 217, 0.08); }
    .category-article-title { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
    .category-article-item:hover .category-article-title,
    .category-article-item.active .category-article-title { color: var(--primary-600); }
    .category-article-date { font-size: 10px; color: var(--text-tertiary); }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border-subtle); }

    .new-article-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      box-shadow: 0 4px 12px rgba(91, 33, 182, 0.25);
    }

    .new-article-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(91, 33, 182, 0.35); }

    /* ========== 主内容区 ========== */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      transition: margin-left 0.3s var(--ease-out);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar.collapsed ~ .main-content { margin-left: 0; }

    .topbar {
      position: sticky;
      top: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(250, 250, 249, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      z-index: 50;
    }

    .topbar-left { display: flex; align-items: center; gap: 14px; }

    .menu-toggle {
      display: none;
      width: 38px;
      height: 38px;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-secondary);
    }

    .topbar-title { font-size: 16px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .topbar-btn:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-primary); }
    .topbar-btn.primary { background: var(--primary-gradient); border: none; color: white; box-shadow: 0 4px 12px rgba(91, 33, 182, 0.2); }
    .topbar-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91, 33, 182, 0.3); }

    /* ========== 容器 ========== */
    .container {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 32px 80px;
      flex: 1;
      width: 100%;
    }

    /* ========== 页面头部 ========== */
    .page-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .page-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .page-title .highlight { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page-subtitle { font-size: 15px; color: var(--text-secondary); }

    .stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-top: 24px;
    }

    .stat-item { text-align: center; }
    .stat-number { font-size: 30px; font-weight: 700; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* ========== 文章列表 - 紧凑卡片 ========== */
    .articles { display: flex; flex-direction: column; gap: 14px; }

    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .article-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .article-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .article-card:hover::before { opacity: 1; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .article-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: rgba(109, 40, 217, 0.1);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--primary-600);
    }

    .article-draft-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: rgba(251, 191, 36, 0.12);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #d97706;
    }

    .article-date { display: flex; align-items: center; gap: 5px; }
    .article-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.2px; transition: color 0.3s; }
    .article-card:hover .article-title { color: var(--primary-600); }
    .article-excerpt { color: var(--text-secondary); font-size: 14px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .article-read-more { font-size: 12px; color: var(--primary-500); display: flex; align-items: center; gap: 4px; opacity: 0; transform: translateX(-6px); transition: all 0.3s var(--ease-out); }
    .article-card:hover .article-read-more { opacity: 1; transform: translateX(0); }
    .article-actions { display: flex; gap: 6px; opacity: 0; transition: all 0.3s var(--ease-out); }
    .article-card:hover .article-actions { opacity: 1; }

    .action-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .action-btn:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-primary); transform: scale(1.05); }
    .action-btn.delete:hover { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.2); color: #ef4444; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      background: var(--primary-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
      animation: pulse 3s ease-in-out infinite;
      box-shadow: 0 8px 32px rgba(91, 33, 182, 0.25);
    }

    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
    .empty-icon svg { width: 36px; height: 36px; color: white; }
    .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .empty-desc { font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px; max-width: 320px; margin-left: auto; margin-right: auto; }

    /* ========== 文章详情 ========== */
    .article-view {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 36px 40px;
      animation: slideUp 0.4s var(--ease-out);
      box-shadow: var(--shadow-card);
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .article-view-header { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-subtle); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    .back-btn:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-primary); transform: translateX(-2px); }
    .article-view-title { font-size: 28px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.3px; }
    .article-view-meta { display: flex; align-items: center; gap: 20px; color: var(--text-tertiary); font-size: 13px; flex-wrap: wrap; }

    .article-view-content { font-size: 16px; line-height: 1.85; color: var(--text-secondary); }
    .article-view-content h1, .article-view-content h2, .article-view-content h3, .article-view-content h4 { color: var(--text-primary); margin-top: 1.3em; margin-bottom: 0.5em; font-weight: 600; }
    .article-view-content h1 { font-size: 1.8em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.3em; }
    .article-view-content h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.3em; }
    .article-view-content h3 { font-size: 1.2em; }
    .article-view-content p { margin-bottom: 1em; }
    .article-view-content a { color: var(--primary-600); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
    .article-view-content a:hover { border-bottom-color: var(--primary-600); }
    .article-view-content strong { color: var(--text-primary); font-weight: 600; }
    .article-view-content ul, .article-view-content ol { margin: 1em 0; padding-left: 1.8em; }
    .article-view-content li { margin-bottom: 0.4em; }
    .article-view-content blockquote { margin: 1.2em 0; padding: 0.8em 1.2em; border-left: 3px solid var(--primary-500); background: rgba(109, 40, 217, 0.05); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .article-view-content code { font-family: 'Fira Code', monospace; font-size: 0.88em; padding: 0.15em 0.4em; background: var(--bg-surface); border-radius: 4px; color: var(--primary-600); }
    .article-view-content pre { margin: 1.2em 0; padding: 1.2em; background: #1a1b26; border-radius: var(--radius-md); overflow-x: auto; }
    .article-view-content pre code { padding: 0; background: none; font-size: 13px; line-height: 1.6; color: #abb2bf; }
    .article-view-content table { width: 100%; margin: 1.2em 0; border-collapse: collapse; }
    .article-view-content th, .article-view-content td { padding: 10px 14px; border: 1px solid var(--border-subtle); text-align: left; }
    .article-view-content th { background: rgba(109, 40, 217, 0.05); font-weight: 600; color: var(--text-primary); }
    .article-view-content img { max-width: 100%; border-radius: var(--radius-md); margin: 1.2em 0; }
    .article-view-content hr { margin: 1.5em 0; border: none; height: 1px; background: var(--border-subtle); }

    /* ========== 编辑器 ========== */
    .editor-page { position: fixed; inset: 0; z-index: 500; background: var(--bg-base); display: none; flex-direction: column; }
    .editor-page.active { display: flex; }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .editor-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .editor-back-btn:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-primary); }
    .editor-topbar-right { display: flex; align-items: center; gap: 10px; }

    .draft-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(251, 191, 36, 0.1);
      border-radius: var(--radius-md);
      color: #d97706;
      font-size: 13px;
    }

    .draft-indicator.active { display: flex; }

    .editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .editor-header { padding: 24px 48px 0; background: var(--bg-card); border-bottom: 1px solid var(--border-subtle); }

    .editor-title-input {
      width: 100%;
      padding: 16px 0;
      background: none;
      border: none;
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: inherit;
      letter-spacing: -0.3px;
    }

    .editor-title-input::placeholder { color: var(--text-tertiary); }
    .editor-title-input:focus { outline: none; }

    .editor-meta-row { display: flex; align-items: center; gap: 14px; padding-bottom: 20px; }

    .category-select {
      flex: 1;
      max-width: 220px;
      padding: 10px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      cursor: pointer;
    }

    .category-select:focus { outline: none; border-color: var(--border-accent); }

    .editor-main { flex: 1; display: flex; overflow: hidden; padding: 0 48px; background: var(--bg-card); }
    .editor-container { flex: 1; display: flex; flex-direction: column; max-width: 100%; }

    .EasyMDEContainer { flex: 1; display: flex; flex-direction: column; background: transparent; border: none; box-shadow: none; }

    .EasyMDEContainer .CodeMirror {
      flex: 1;
      height: auto !important;
      background: transparent !important;
      font-size: 16px;
      font-family: 'Fira Code', monospace;
      line-height: 1.8;
      color: var(--text-primary);
      padding: 20px 0;
    }

    .EasyMDEContainer .CodeMirror-gutters { background: transparent !important; border-right: none !important; }
    .EasyMDEContainer .CodeMirror-linenumber { color: var(--text-tertiary) !important; }
    .EasyMDEContainer .CodeMirror-cursor { border-left-color: var(--primary-500) !important; }
    .EasyMDEContainer .CodeMirror-selected { background: rgba(109, 40, 217, 0.12) !important; }

    /* 工具栏 - 标题下拉 */
    .editor-toolbar { background: var(--bg-surface) !important; border-bottom: 1px solid var(--border-subtle) !important; border-top: none !important; padding: 8px 0 !important; flex-wrap: wrap; gap: 4px !important; }
    .editor-toolbar button { color: var(--text-secondary) !important; background: transparent !important; border: none !important; border-radius: var(--radius-sm) !important; padding: 6px 10px !important; font-size: 13px !important; }
    .editor-toolbar button:hover { background: var(--bg-card) !important; color: var(--text-primary) !important; }
    .editor-toolbar button.active { background: rgba(109, 40, 217, 0.1) !important; color: var(--primary-600) !important; }

    /* 标题选择器 */
    .heading-dropdown {
      position: relative;
      display: inline-block;
    }

    .heading-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .heading-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .heading-btn::after {
      content: '▾';
      font-size: 10px;
      margin-left: 2px;
    }

    .heading-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-hover);
      padding: 6px 0;
      min-width: 140px;
      z-index: 1000;
      display: none;
      margin-top: 4px;
    }

    .heading-menu.active { display: block; }

    .heading-menu-item {
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .heading-menu-item:hover { background: var(--bg-surface); }
    .heading-menu-item[data-level="1"] { font-size: 18px; font-weight: 700; }
    .heading-menu-item[data-level="2"] { font-size: 16px; font-weight: 600; }
    .heading-menu-item[data-level="3"] { font-size: 14px; font-weight: 600; }
    .heading-menu-item[data-level="4"] { font-size: 13px; font-weight: 500; }
    .heading-menu-item[data-level="5"] { font-size: 12px; font-weight: 500; }
    .heading-menu-item[data-level="6"] { font-size: 11px; font-weight: 500; }
    .heading-menu-item .heading-hash { color: var(--text-tertiary); font-family: monospace; }
    .heading-menu-item[data-level="1"] .heading-hash { font-size: 14px; }
    .heading-menu-item[data-level="2"] .heading-hash { font-size: 13px; }
    .heading-menu-item[data-level="3"] .heading-hash { font-size: 12px; }
    .heading-menu-item[data-level="4"] .heading-hash { font-size: 11px; }
    .heading-menu-item[data-level="5"] .heading-hash { font-size: 10px; }
    .heading-menu-item[data-level="6"] .heading-hash { font-size: 9px; }

    .EasyMDEContainer .CodeMirror-placeholder { color: transparent !important; }
    .EasyMDEContainer.focused { box-shadow: none !important; }
    .EasyMDEContainer .editor-statusbar { background: transparent !important; border-top: none !important; color: var(--text-tertiary) !important; font-size: 11px; padding: 6px 0; }

    .editor-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 48px;
      background: var(--bg-card);
      border-top: 1px solid var(--border-subtle);
    }

    .editor-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .editor-btn-secondary { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .editor-btn-secondary:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-primary); }
    .editor-btn-primary { background: var(--primary-gradient); border: none; color: white; box-shadow: 0 4px 12px rgba(91, 33, 182, 0.2); }
    .editor-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91, 33, 182, 0.3); }

    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      border: none;
      font-family: inherit;
    }

    .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(91, 33, 182, 0.2); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91, 33, 182, 0.3); }

    /* 模态框 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }

    .modal { background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 380px; box-shadow: var(--shadow-hover); }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      margin-bottom: 16px;
    }

    .modal-input:focus { outline: none; border-color: var(--border-accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .modal-btn {
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .modal-btn-cancel { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .modal-btn-cancel:hover { background: var(--bg-card); color: var(--text-primary); }
    .modal-btn-confirm { background: var(--primary-gradient); border: none; color: white; }
    .modal-btn-confirm:hover { opacity: 0.9; }

    /* 确认返回模态框样式 */
    .confirm-modal { text-align: center; max-width: 360px; }
    .confirm-modal .modal-title { font-size: 20px; margin-bottom: 10px; }
    .confirm-modal-text { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .confirm-modal-actions { display: flex; flex-direction: column; gap: 10px; }
    .confirm-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
    }
    .confirm-btn-save { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(91, 33, 182, 0.2); }
    .confirm-btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91, 33, 182, 0.3); }
    .confirm-btn-discard { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .confirm-btn-discard:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
    .confirm-btn-cancel { background: transparent; color: var(--text-tertiary); font-weight: 500; }
    .confirm-btn-cancel:hover { color: var(--text-secondary); }

    /* 响应式 */
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-width))); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .menu-toggle { display: flex; }
    }

    @media (max-width: 768px) {
      .topbar { padding: 0 16px; }
      .container { padding: 28px 16px 60px; }
      .page-title { font-size: 26px; }
      .stats { gap: 32px; }
      .stat-number { font-size: 24px; }
      .article-card { padding: 16px 20px; }
      .article-title { font-size: 16px; }
      .article-actions { opacity: 1; }
      .article-read-more { display: none; }
      .article-view { padding: 24px 20px; }
      .article-view-title { font-size: 22px; }
      .editor-header { padding: 20px 16px 0; }
      .editor-title-input { font-size: 24px; padding: 14px 0; }
      .editor-main { padding: 0 16px; }
      .editor-footer { padding: 14px 16px; }
    }

    .article-card { animation: fadeInUp 0.4s var(--ease-out) backwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .article-card:nth-child(1) { animation-delay: 0.03s; }
    .article-card:nth-child(2) { animation-delay: 0.06s; }
    .article-card:nth-child(3) { animation-delay: 0.09s; }
    .article-card:nth-child(4) { animation-delay: 0.12s; }
    .article-card:nth-child(5) { animation-delay: 0.15s; }

    ::selection { background: rgba(109, 40, 217, 0.15); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
  </style>
</head>
<body>
  <!-- 高级动态背景 -->
  <div class="bg-container">
    <div class="grid-bg"></div>
    <div class="glow-layer"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="particles-container">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="lines-container">
      <div class="flow-line"></div>
      <div class="flow-line"></div>
      <div class="flow-line"></div>
      <div class="flow-line"></div>
      <div class="flow-line"></div>
    </div>
    <div class="geo-container">
      <div class="geo-shape geo-shape-1"></div>
      <div class="geo-shape geo-shape-2"></div>
      <div class="geo-shape geo-shape-3"></div>
      <div class="geo-shape geo-shape-4"></div>
    </div>
    <div class="ripple-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>
  </div>

  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#" class="sidebar-logo" onclick="showHome(); return false;">
          <span class="logo-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4c1d95"/>
                  <stop offset="50%" stop-color="#5b21b6"/>
                  <stop offset="100%" stop-color="#7c3aed"/>
                </linearGradient>
              </defs>
              <circle cx="50" cy="50" r="46" stroke="url(#logoGrad)" stroke-width="3" fill="none" opacity="0.4"/>
              <circle cx="50" cy="50" r="42" fill="url(#logoGrad)" opacity="0.15"/>
              <g stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
                <path d="M30 28 L45 50 L30 72"/>
                <path d="M70 28 L55 50 L70 72"/>
              </g>
              <circle cx="50" cy="42" r="2.5" fill="white" opacity="0.9"/>
            </svg>
          </span>
          <span class="sidebar-logo-text">X-Blog</span>
        </a>
        <button class="sidebar-toggle" onclick="toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <div class="sidebar-search">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..."
            oninput="handleSearch(this.value)"
            onfocus="handleSearchFocus(true)"
            onblur="handleSearchFocus(false)">
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>

      <div class="sidebar-content">
        <div class="sidebar-section">
          <div class="nav-item active" id="allArticlesNav" onclick="filterByCategory(null)">
            <span class="nav-item-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </span>
            <span class="nav-item-text">全部文章</span>
            <span class="nav-item-count" id="totalArticleCount">0</span>
          </div>
          <div class="nav-item" id="draftsNav" onclick="filterByDrafts()">
            <span class="nav-item-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </span>

        <div class="sidebar-section">
          <div class="sidebar-section-header">

            <button class="add-category-btn" onclick="openAddCategoryModal()" title="添加分类">+</button>
          </div>
          <div id="categoryList"></div>
        </div>

      <div class="sidebar-footer">
        <button class="new-article-btn" onclick="openEditor()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          写文章
        </button>
      </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="topbar-title" id="topbarTitle">全部文章</h1>
        </div>
        <div class="topbar-right">
          <button class="topbar-btn primary" onclick="openEditor()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            写文章
          </button>
        </div>
      </header>

      <main class="container">
        <div id="listView">
          <header class="page-header">
            <h1 class="page-title">记录<span class="highlight">思考</span>，分享成长</h1>
            <p class="page-subtitle" id="pageSubtitle">在这里，留下每一次灵感的火花</p>
            <div class="stats">
              <div class="stat-item">
                <div id="articleCount" class="stat-number">0</div>
                <div class="stat-label">篇文章</div>
              </div>
              <div class="stat-item">
                <div class="stat-number" id="wordCount">0</div>
                <div class="stat-label">字记录</div>
              </div>
            </div>
          </header>
          <div id="articlesList" class="articles"></div>
        </div>

        <div id="articleView" style="display: none;">
          <button class="back-btn" onclick="showHome()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            返回列表
          </button>
          <div id="articleDetail" class="article-view"></div>
        </div>
